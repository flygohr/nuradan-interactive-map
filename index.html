<!DOCTYPE html>
<html style="height: 100%;">

<head>
    <title>Nuradan World Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="leaflet/leaflet.css">
    <script src="leaflet/leaflet.js"></script>
</head>

<body style="height: 100%; margin: 0;">
    <div id="map" style="width: 100%; height: 100%; background: #000000;"></div>
    <script type="text/javascript">
        //Creating the Map
        var map = L.map('map', {
            crs: L.CRS.Simple
        }).setView([-12.273573, 36.812446],5);

        // at max zoom (z=8): 60*34 @ 256px
        var maxZoom = 8;
        var tileSize = 256;
        var sw = map.unproject([0, 34 * tileSize], maxZoom);
        var ne = map.unproject([60 * tileSize, 0], maxZoom);
        var bounds = L.latLngBounds(sw, ne);

        let layer = L.tileLayer('images/mapv1/{z}/{x}/{y}.png', {
            noWrap: true,
            bounds: bounds,
            minZoom: 5,
            maxZoom: 8,
            attribution: '&copy; <a href="https://nuradan.flygohr.com">Nuradan Project</a>'
        });
        layer.on('tileloadstart', e => console.log(e.coords)); // {x, y, z}
        layer.addTo(map);

        map.setMaxBounds(bounds);
        map.fitBounds(bounds);

        //Coordinate Finder
        var marker = L.marker([-12.679715, 37.128835], {
            draggable: true,
        }).addTo(map);
        marker.bindPopup('LatLng Marker').openPopup();
        marker.on('dragend', function (e) {
            marker.getPopup().setContent(marker.getLatLng().toString()).openOn(map);
        });

        //Markers
        var mts_sund = L.marker([-12.273573, 36.812446]).bindPopup('<b>Sund</b>').addTo(map);
    </script>
</body>

</html>
