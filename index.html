<!DOCTYPE html>
<html style="height: 100%;">

<head>
    <title>Nuradan World Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="leaflet/leaflet.css">
    <script src="leaflet/leaflet.js"></script>
</head>

<body style="height: 100%; margin: 0;">
    <div id="map" style="width: 100%; height: 100%; background: #000000;"></div>
    <script type="text/javascript">
        //Creating the Map
        var map = L.map('map').setView([73.60086, 27.089459], 6);

        let layer = L.tileLayer('images/mapv4/{z}/{x}/{y}.png', {
            continuousWorld: false,
            noWrap: true,
            minZoom: 5,
            maxZoom: 7,
        });
        layer.on('tileloadstart', e => console.log(e.coords)); // {x, y, z}
        layer.addTo(map);

        //Coordinate Finder
        var marker = L.marker([73.294217, 29.769844], {
            draggable: true,
        }).addTo(map);
        marker.bindPopup('LatLng Marker').openPopup();
        marker.on('dragend', function (e) {
            marker.getPopup().setContent(marker.getLatLng().toString()).openOn(map);
        });

        //Markers
        var mts_sund = L.marker([73.60086, 27.089459]).bindPopup('<b>Sund</b>').addTo(map);
    </script>
</body>

</html>
